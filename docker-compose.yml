services:
  flask-server:
    build:
      context: .
      dockerfile: Dockerfile
      target: flask-server
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    ports:
      - "5000:4000"  # Expose port 5000 to the host
    depends_on:
      - pgdb

  pgdb:
    image: postgres:17
    container_name: db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=passw0rd
      - POSTGRES_DB=postgres
    volumes:
      - data:/var/lib/postgresql/data
    ports:
      - "5432:5432"